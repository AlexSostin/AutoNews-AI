name: Frontend Code Quality

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend-next/**'
  pull_request:
    paths:
      - 'frontend-next/**'

jobs:
  quality:
    name: Lint + Duplicate Detection
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-next

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-next/package-lock.json

      - name: Install dependencies
        run: npm ci

      # ── ESLint (includes sonarjs rules) ──────────────────────────────
      - name: ESLint
        run: npm run lint

      # ── jscpd: detect copy-paste duplication ─────────────────────────
      - name: Check for code duplication (jscpd)
        run: npm run dupes

      # ── Vitest unit tests ─────────────────────────────────────────────
      - name: Unit tests
        run: npx vitest run
