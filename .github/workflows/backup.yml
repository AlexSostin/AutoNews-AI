name: Database Backup

on:
  schedule:
    # Every day at 3:00 UTC (6:00 Jerusalem / Israel time)
    - cron: '0 3 * * *'
  workflow_dispatch:  # Can be triggered manually

jobs:
  backup:
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    # Note: secrets cannot be accessed in job-level 'if' conditions (GitHub security restriction).
    # BACKUP_ENABLED var controls this job; DATABASE_URL is checked inside the steps.
    if: vars.BACKUP_ENABLED == 'true'

    steps:
      - name: Check if DATABASE_URL is set
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "⚠️ DATABASE_URL secret not set — skipping backup"
            echo "To enable backups: add DATABASE_URL to GitHub repo secrets"
            exit 0
          fi
          echo "✅ DATABASE_URL found, proceeding with backup"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Backup database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "Skipping — no DATABASE_URL"
            exit 0
          fi
          FILENAME="backup_$(date +%Y%m%d_%H%M%S).sql"
          pg_dump "$DATABASE_URL" > "$FILENAME"
          gzip "$FILENAME"
          echo "✅ Backup created: ${FILENAME}.gz ($(du -h ${FILENAME}.gz | cut -f1))"

      - name: Upload to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: database-backup-${{ github.run_number }}
          path: backup_*.sql.gz
          retention-days: 30
        if: hashFiles('backup_*.sql.gz') != ''
