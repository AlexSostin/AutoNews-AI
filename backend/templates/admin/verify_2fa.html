<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>2FA Verification — Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e2e8f0;
        }
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 40px;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .icon {
            font-size: 48px;
            text-align: center;
            margin-bottom: 16px;
        }
        h1 {
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            color: #f1f5f9;
        }
        .subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 28px;
            line-height: 1.5;
        }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            font-size: 24px;
            letter-spacing: 8px;
            text-align: center;
            background: #0f172a;
            border: 2px solid #334155;
            border-radius: 12px;
            color: #f1f5f9;
            outline: none;
            transition: border-color 0.2s;
            font-family: 'Courier New', monospace;
        }
        input[type="text"]:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.2);
        }
        input[type="text"]::placeholder {
            color: #475569;
            letter-spacing: 4px;
            font-size: 18px;
        }
        .btn {
            width: 100%;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #5558e6, #7c4de0);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(99,102,241,0.4);
        }
        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .alert-error {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.3);
            color: #fca5a5;
        }
        .alert-success {
            background: rgba(34,197,94,0.15);
            border: 1px solid rgba(34,197,94,0.3);
            color: #86efac;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #475569;
        }
        .footer a {
            color: #6366f1;
            text-decoration: none;
        }
        .footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🔐</div>
        <h1>Admin 2FA Verification</h1>
        <p class="subtitle">
            Enter the 6-digit code from your<br>
            authenticator app to continue.
        </p>

        {% if messages %}
            {% for message in messages %}
                <div class="alert {% if message.tags == 'error' %}alert-error{% elif message.tags == 'success' %}alert-success{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post" autocomplete="off">
            {% csrf_token %}
            <div class="form-group">
                <label for="totp_code">Authentication Code</label>
                <input
                    type="text"
                    id="totp_code"
                    name="totp_code"
                    maxlength="8"
                    pattern="[0-9A-Fa-f]*"
                    placeholder="••••••"
                    autofocus
                    required
                >
            </div>
            <button type="submit" class="btn btn-primary">
                🔑 Verify & Continue
            </button>
        </form>

        <div class="footer">
            Lost your device? Use a <strong>backup code</strong> instead.<br>
            <a href="/admin/logout/">← Back to Login</a>
        </div>
    </div>
</body>
</html>
