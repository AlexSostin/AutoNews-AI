services:
  postgres:
    image: postgres:17-alpine
    container_name: autonews_postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-autonews}
      POSTGRES_USER: ${POSTGRES_USER:-autonews_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: >
      postgres -c listen_addresses='*' -c log_connections=on -c log_disconnections=on -c log_statement=all
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-autonews_user} -d ${POSTGRES_DB:-autonews}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - autonews_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autonews_backend
    env_file:
      - .env
      - .env
    command: >
      sh -c "python manage.py migrate &&
             python manage.py verify_migrations &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 --http-timeout 120 auto_news_site.asgi:application --access-log -"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - RUNNING_IN_DOCKER=1
      - DB_HOST=postgres
      - DB_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-autonews}
      - POSTGRES_USER=${POSTGRES_USER:-autonews_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - FRONTEND_URL=http://frontend:3000
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - autonews_network

  frontend:
    build:
      context: ../frontend-next
      dockerfile: Dockerfile
    container_name: autonews_frontend
    env_file:
      - .env
    volumes:
      - ../frontend-next:/app
      - /app/.next
    ports:
      - "3000:3000"
    command: npm run dev
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - NEXT_PUBLIC_API_URL_SERVER=http://backend:8000/api/v1
      - API_INTERNAL_URL=http://backend:8000/api/v1
      - NEXT_PUBLIC_MEDIA_URL=http://localhost:8000
      - NEXT_PUBLIC_SITE_URL=http://localhost:3000
      - NEXT_PUBLIC_SENTRY_DSN=${SENTRY_DSN:-}
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - autonews_network

  redis:
    image: redis:7-alpine
    container_name: autonews_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - autonews_network

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autonews_celery_worker
    env_file:
      - .env
      - .env
    command: celery -A auto_news_site worker -l info --concurrency=2
    volumes:
      - .:/app
    environment:
      - DEBUG=True
      - RUNNING_IN_DOCKER=1
      - DB_HOST=postgres
      - DB_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-autonews}
      - POSTGRES_USER=${POSTGRES_USER:-autonews_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - autonews_network

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autonews_celery_beat
    env_file:
      - .env
      - .env
    command: celery -A auto_news_site beat -l info
    volumes:
      - .:/app
    environment:
      - DEBUG=True
      - RUNNING_IN_DOCKER=1
      - DB_HOST=postgres
      - DB_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-autonews}
      - POSTGRES_USER=${POSTGRES_USER:-autonews_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - autonews_network

volumes:
  postgres_data:
  static_volume:
  media_volume:


networks:
  autonews_network:
    driver: bridge
